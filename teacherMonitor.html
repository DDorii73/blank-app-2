<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>교사 모니터링</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Teacher Dashboard</p>
        <h1>교사 모니터링 페이지</h1>
      </div>
      <nav class="top-nav">
        <a href="./index.html">메인</a>
        <a href="./student.html">학생 검사</a>
        <button id="logoutBtn" class="ghost-button">로그아웃</button>
      </nav>
    </header>

    <main class="app-shell">
      <section id="authGate" class="notice warning">
        로그인 상태를 확인하고 있습니다. 교사 Google 로그인이 필요합니다.
      </section>

      <section id="dashboardContent" class="workspace hidden">
        <div class="teacher-strip">
          <span id="teacherInfo">교사 계정 확인 중</span>
          <button id="refreshBtn" class="text-button" type="button">새로고침</button>
        </div>

        <section class="stats-grid">
          <article class="stat-card">
            <span>저장 검사</span>
            <strong id="totalCount">0</strong>
          </article>
          <article class="stat-card">
            <span>학생 수</span>
            <strong id="studentCount">0</strong>
          </article>
          <article class="stat-card">
            <span>평균 점수</span>
            <strong id="averageScore">-</strong>
          </article>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>학생별 결과 조회</h2>
            <div class="filter-row">
              <input id="studentFilter" type="search" placeholder="학생 이름, ID, 반 검색" />
              <input id="dateFilter" type="date" />
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>검사 날짜</th>
                  <th>학생</th>
                  <th>학년/반</th>
                  <th>읽기 속도</th>
                  <th>정확도</th>
                  <th>최종 점수</th>
                  <th>오류</th>
                  <th>보고서</th>
                </tr>
              </thead>
              <tbody id="resultsTableBody"></tbody>
            </table>
          </div>
          <p id="emptyState" class="muted hidden">저장된 분석 결과가 없습니다.</p>
        </section>

        <section id="detailPanel" class="panel hidden">
          <div class="panel-heading">
            <h2>선택한 학생 보고서</h2>
            <button id="closeDetailBtn" class="text-button" type="button">닫기</button>
          </div>
          <div id="detailContent" class="report-card"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./src/admin.js"></script>
  </body>
</html>
