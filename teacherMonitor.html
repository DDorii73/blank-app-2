<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>교사 모니터링</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Teacher Dashboard</p>
        <h1>교사 모니터링</h1>
      </div>
      <nav class="top-nav">
        <a href="./index.html">메인 화면으로 돌아가기</a>
        <a href="./student.html">학생 검사</a>
        <button id="logoutBtn" class="ghost-button">로그아웃</button>
      </nav>
    </header>

    <main class="app-shell">
      <section id="authGate" class="notice warning">
        로그인 상태를 확인하고 있습니다. 교사 Google 로그인이 필요합니다.
      </section>

      <section id="dashboardContent" class="workspace hidden">
        <div class="teacher-strip">
          <span id="teacherInfo">교사 계정 확인 중</span>
        </div>

        <section class="panel">
          <div class="panel-heading">
            <h2>학생 검색 영역</h2>
            <a class="secondary-button" href="./index.html">메인 화면으로 돌아가기</a>
          </div>
          <div class="field-grid two-columns">
            <label>
              학생 이름 검색
              <input id="studentFilter" type="search" placeholder="학생 이름 입력" />
            </label>
            <label>
              검사 날짜 검색
              <input id="dateFilter" type="date" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>검사 결과 목록 영역</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>학생 이름</th>
                  <th>검사 날짜</th>
                  <th>읽기 속도</th>
                  <th>10초당 정확 음절 수</th>
                  <th>주요 오류 유형</th>
                  <th>상세 보기</th>
                </tr>
              </thead>
              <tbody id="resultsTableBody"></tbody>
            </table>
          </div>
          <p id="emptyState" class="muted hidden">저장된 분석 결과가 없습니다.</p>
        </section>

        <section id="detailPanel" class="panel hidden">
          <div class="panel-heading">
            <h2>상세 보기 영역</h2>
            <button id="closeDetailBtn" class="text-button" type="button">닫기</button>
          </div>
          <h3>학생 개별 분석 표</h3>
          <div class="table-wrap">
            <table>
              <tbody id="detailAnalysisTableBody"></tbody>
            </table>
          </div>

          <h3>학생 개별 보고서</h3>
          <textarea id="detailReportText" rows="10" readonly></textarea>
        </section>
      </section>
    </main>

    <script type="module" src="./src/admin.js"></script>
  </body>
</html>
